name: AI Radar 每日抓取

on:
  schedule:
    # 每天 UTC 0:00 = 北京时间 8:00
    - cron: "0 0 * * *"
  workflow_dispatch:  # 支持手动触发

jobs:
  crawl:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install -r crawler/requirements.txt

      - name: Run crawler
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM: ${{ secrets.RESEND_FROM }}
          RESEND_TO: ${{ secrets.RESEND_TO }}
          WECHAT_WEBHOOK_URL: ${{ secrets.WECHAT_WEBHOOK_URL }}
        run: python crawler/main.py

      - name: Commit updated database
        run: |
          git config user.name "ai-radar-bot"
          git config user.email "bot@ai-radar.dev"
          git add prisma/dev.db
          git diff --staged --quiet || git commit -m "chore: update daily AI radar data"
          git push
